name: Performance Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run benchmarks
        run: |
          go test ./internal/handlers/... -bench=. -benchmem -benchtime=3s | tee new.txt
      
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      
      - name: Download baseline
        continue-on-error: true
        run: |
          # Download baseline from main branch or artifacts
          gh run download --name benchmark-baseline --dir . || echo "No baseline found"
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: Compare with baseline
        if: hashFiles('baseline.txt') != ''
        run: |
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          benchstat baseline.txt new.txt | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Check for regressions
        if: hashFiles('baseline.txt') != ''
        run: |
          # Fail if any benchmark regressed by more than 20%
          if benchstat baseline.txt new.txt | grep -E "\+[2-9][0-9]\.[0-9]+%|\+[0-9]{3,}"; then
            echo "❌ Performance regression detected (>20%)"
            exit 1
          fi
          echo "✅ No significant regressions"
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: new.txt
      
      - name: Update baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-baseline
          path: new.txt
